name: Generate Streak Stats

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:         # lets you trigger it manually from the Actions tab

jobs:
  streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate streak stats SVG
        uses: DenverCoder1/github-readme-streak-stats@master
        with:
          user_id: Jahidul183019
          github_token: ${{ secrets.GITHUB_TOKEN }}
          theme: tokyonight
          hide_border: true
          output: assets/streak-stats.svg

      - name: Commit updated SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/streak-stats.svg
          git diff --staged --quiet || git commit -m "chore: update streak stats"
          git push
